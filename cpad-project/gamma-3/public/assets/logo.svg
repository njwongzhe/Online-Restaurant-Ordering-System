<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100%" height="100%">
    <defs>
        <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#E25C1D" />
            <stop offset="100%" stop-color="#AB3600" />
        </linearGradient>
    </defs>
    <!-- Background rounded card -->
    <rect width="120" height="120" rx="22" fill="url(#logoGrad)" />
    
    <!-- Outer delicate ring -->
    <circle cx="60" cy="60" r="42" fill="none" stroke="rgba(255, 255, 255, 0.3)" stroke-width="1.5" stroke-dasharray="4 4" />
    <!-- Inner solid ring -->
    <circle cx="60" cy="60" r="35" fill="none" stroke="rgba(255, 255, 255, 0.8)" stroke-width="2" />
    
    <!-- Fork Graphic (Left) -->
    <path d="M48,42 L48,60 M44,42 L44,52 C44,57 48,57 48,60 M52,42 L52,52 C52,57 48,57 48,60 M48,60 L48,78" 
          fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Knife Graphic (Right) -->
    <path d="M72,42 L72,62 C72,62 72,66 68,66 M72,42 C72,42 68,44 68,54 L68,62 M70,62 L70,78" 
          fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
          
    <!-- Cloche/Cover Handle (Center top) -->
    <path d="M55,34 C55,30 65,30 65,34" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" />
</svg>
